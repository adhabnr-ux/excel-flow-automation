name: Validate Content

on:
  push:
    paths:
      - 'content/**.json'
      - 'validate.py'
  pull_request:
    paths:
      - 'content/**.json'
      - 'validate.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate content files
        run: python3 validate.py
