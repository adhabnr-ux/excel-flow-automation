name: Excel Flow Delivery

# cron-job.org is the primary trigger (repository_dispatch).
# GitHub's built-in cron is a single fallback per window.
# Sentinel files prevent double-sending if both fire.
#
# Cron is UTC — America/Phoenix is UTC-7 (no DST).
#   Morning : 06:30 MST = 13:30 UTC
#   Midday  : 11:00 MST = 18:00 UTC
#   Evening : 16:00 MST = 23:00 UTC

on:
  repository_dispatch:
    types: [morning, midday, evening]
  schedule:
    - cron: '30 13 * * *'   # Morning   06:30 MST
    - cron: '0 18 * * *'    # Midday    11:00 MST
    - cron: '0 23 * * *'    # Evening   16:00 MST
  workflow_dispatch:
    inputs:
      window:
        description: 'Window to deliver (manual override)'
        required: true
        type: choice
        options: [Morning, Midday, Evening]

permissions:
  contents: write   # needed to commit sentinel files

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve window
        id: win
        run: |
          if [ -n "${{ inputs.window }}" ]; then
            echo "window=${{ inputs.window }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              morning) echo "window=Morning" >> "$GITHUB_OUTPUT" ;;
              midday)  echo "window=Midday"  >> "$GITHUB_OUTPUT" ;;
              evening) echo "window=Evening" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            case "${{ github.event.schedule }}" in
              "30 13 * * *") echo "window=Morning" >> "$GITHUB_OUTPUT" ;;
              "0 18 * * *")  echo "window=Midday"  >> "$GITHUB_OUTPUT" ;;
              "0 23 * * *")  echo "window=Evening" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Check sentinel
        id: sentinel
        run: |
          TODAY=$(python3 -c "import datetime; tz=datetime.timezone(datetime.timedelta(hours=-7)); print(datetime.datetime.now(tz).strftime('%Y-%m-%d'))")
          SENTINEL="delivered/${TODAY}-${{ steps.win.outputs.window }}.txt"
          echo "sentinel=$SENTINEL" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          if [ -f "$SENTINEL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already delivered ${{ steps.win.outputs.window }} on ${TODAY} — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No sentinel — proceeding with delivery."
          fi

      - name: Deliver
        if: steps.sentinel.outputs.skip == 'false'
        id: deliver
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 deliver.py "${{ steps.win.outputs.window }}"

      - name: Mark delivered
        if: steps.sentinel.outputs.skip == 'false' && steps.deliver.outcome == 'success'
        run: |
          mkdir -p delivered
          echo "Delivered at $(date -u)" > "${{ steps.sentinel.outputs.sentinel }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase origin main
          git add "${{ steps.sentinel.outputs.sentinel }}"
          git commit -m "mark ${{ steps.win.outputs.window }} delivered ${{ steps.sentinel.outputs.today }}"
          git push origin main
