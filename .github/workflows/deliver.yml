name: Excel Flow Delivery

# Runs every 30 minutes. deliver.py auto-detects which posts are due in the
# current slot (America/Phoenix, UTC-7, no DST) and sends only those.
# Each post arrives on WhatsApp at its own scheduled time — no early batching.
#
# repository_dispatch (types: morning/midday/evening) is kept for the
# cron-job.org backup trigger if GitHub's scheduler ever stalls.
on:
  repository_dispatch:
    types: [morning, midday, evening]
  schedule:
    - cron: '*/30 * * * *'   # every 30 min — deliver.py picks the right slot
  workflow_dispatch:
    inputs:
      window:
        description: 'Window to deliver (manual test run)'
        required: true
        type: choice
        options: [Morning, Midday, Evening]

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Deliver
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          if [ -n "${{ inputs.window }}" ]; then
            python3 deliver.py "${{ inputs.window }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              morning) python3 deliver.py Morning ;;
              midday)  python3 deliver.py Midday  ;;
              evening) python3 deliver.py Evening ;;
            esac
          else
            python3 deliver.py
          fi
