name: Excel Flow Delivery

# Three scheduled runs per day (cron is UTC; America/Phoenix is UTC-7, no DST).
# 06:30 MST = 13:30 UTC  |  11:00 MST = 18:00 UTC  |  16:00 MST = 23:00 UTC
#
# repository_dispatch is a reliable backup: cron-job.org can POST to the GitHub
# API with event_type morning/midday/evening if the scheduler ever stalls.
on:
  repository_dispatch:
    types: [morning, midday, evening]
  schedule:
    - cron: '30 13 * * *'   # Morning  — 06:30 America/Phoenix
    - cron: '0 18 * * *'    # Midday   — 11:00 America/Phoenix
    - cron: '0 23 * * *'    # Evening  — 16:00 America/Phoenix
  workflow_dispatch:
    inputs:
      window:
        description: 'Window to deliver (manual test run)'
        required: true
        type: choice
        options: [Morning, Midday, Evening]

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve window
        id: win
        run: |
          if [ -n "${{ inputs.window }}" ]; then
            echo "window=${{ inputs.window }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              morning) echo "window=Morning" >> "$GITHUB_OUTPUT" ;;
              midday)  echo "window=Midday"  >> "$GITHUB_OUTPUT" ;;
              evening) echo "window=Evening" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            case "${{ github.event.schedule }}" in
              "30 13 * * *") echo "window=Morning" >> "$GITHUB_OUTPUT" ;;
              "0 18 * * *")  echo "window=Midday"  >> "$GITHUB_OUTPUT" ;;
              "0 23 * * *")  echo "window=Evening" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Deliver
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python3 deliver.py "${{ steps.win.outputs.window }}"
